<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Landing View -->
        <div id="landing-view" class="view active">
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 100 100" width="80" height="80">
                    <path d="M10,40 Q25,25 50,40 Q75,25 90,40 L90,55 Q75,40 50,55 Q25,40 10,55 Z" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M50,40 L50,55" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="50" cy="80" r="8" fill="#ffffff" />
                </svg>
                <h1 class="logo-text">SpeEdLabs</h1>
            </div>
            <p class="subtitle">Your Gateway to Interactive Learning</p>
            <button id="start-btn" class="primary-btn">Find Your Mind Map</button>
        </div>

        <!-- Selection View -->
        <div id="selection-view" class="view">
            <div class="header">
                <div class="logo-container-small">
                    <svg class="logo-icon-small" viewBox="0 0 100 100" width="40" height="40">
                        <path d="M10,40 Q25,25 50,40 Q75,25 90,40 L90,55 Q75,40 50,55 Q25,40 10,55 Z" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M50,40 L50,55" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="50" cy="80" r="8" fill="#ffffff" />
                    </svg>
                    <h2 class="logo-text-small">SpeEdLabs</h2>
                </div>
                <button id="back-btn" class="secondary-btn">Back</button>
            </div>
            
            <div class="selection-container">
                <h2 class="title">Select your path</h2>
                
                <div class="dropdown-group">
                    <label for="class-select">1. Choose your class</label>
                    <select id="class-select" class="custom-select">
                        <option value="" disabled selected>Select Class</option>
                        <!-- Options populated by JS -->
                    </select>
                </div>

                <div class="dropdown-group">
                    <label for="subject-select">2. Choose your subject</label>
                    <select id="subject-select" class="custom-select" disabled>
                        <option value="" disabled selected>Select Subject</option>
                    </select>
                </div>

                <div class="dropdown-group">
                    <label for="topic-select">3. Choose your topic</label>
                    <select id="topic-select" class="custom-select" disabled>
                        <option value="" disabled selected>Select Topic</option>
                    </select>
                </div>

                <div class="dropdown-group">
                    <label for="subtopic-select">4. Choose your subtopic</label>
                    <select id="subtopic-select" class="custom-select" disabled>
                        <option value="" disabled selected>Select Subtopic</option>
                    </select>
                </div>
                
                <div class="action-container">
                    <button id="go-btn" class="primary-btn" disabled>Go to Mind Map</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
